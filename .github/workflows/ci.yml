name: CI

on:
  merge_group:
  push:
    branches: [main]
  pull_request:
    # Recommended by Graphite: https://graphite.dev/docs/github-configuration-guidelines#github-actions
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # golangci-lint's `new-from-rev: origin/main` needs full history
          # to compute the diff between HEAD and main.
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # Cache both the main module and the tools module (golangci-lint
          # has a heavy dep graph — caching it saves ~30s per run).
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          go -C tools mod tidy
          if [[ -n "$(git status --porcelain go.mod go.sum tools/go.mod tools/go.sum)" ]]; then
            echo "::error::go.mod / go.sum are not tidy. Run 'go mod tidy' (and 'go -C tools mod tidy') and commit the changes."
            git --no-pager diff -- go.mod go.sum tools/go.mod tools/go.sum
            exit 1
          fi

      - name: Lint
        # golangci-lint is pinned in tools/go.mod via the `tool` directive;
        # -modfile points `go tool` at that module while keeping cwd at the
        # repo root so `./...` resolves to the main module.
        run: go tool -modfile=tools/go.mod golangci-lint run ./...

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -shuffle=on ./...
